<ion-modal
  [isOpen]="isOpen"
  [keepContentsMounted]="true"
  (didDismiss)="cancel()">

  <ng-template>
    <ion-header>
      <ion-toolbar color="primary">
        <ion-buttons slot="start">
          <ion-button type="button" (click)="cancel()">Cancelar</ion-button>
        </ion-buttons>

        <ion-title>{{ title }}</ion-title>

        <ion-buttons slot="end" *ngIf="multiple">
          <ion-button type="button" (click)="confirm()">Seleccionar</ion-button>
        </ion-buttons>
      </ion-toolbar>

      <ion-toolbar>
        <ion-searchbar
          [(ngModel)]="searchText"
          (ionInput)="onSearchChange()"
          placeholder="Buscar..."
          debounce="200">
        </ion-searchbar>
      </ion-toolbar>
    </ion-header>

    <ion-content>
      <ion-list>

        <!-- MULTIPLE -->
        <ng-container *ngIf="multiple; else singleTpl">
          <ion-item
            button
            detail="false"
            *ngFor="let item of filteredData; trackBy: trackByIndex"
            (click)="toggleItem(item)">

            <ion-label>
              {{ getLabel(item) || '—' }}
            </ion-label>

            <ion-checkbox
              slot="end"
              [checked]="isSelected(item)">
            </ion-checkbox>
          </ion-item>
        </ng-container>

        <!-- SINGLE -->
        <ng-template #singleTpl>
          <ion-item
            button
            detail="false"
            tappable
            *ngFor="let item of filteredData; trackBy: trackByIndex"
            (pointerup)="selectSingle(item)">

            <ion-label>
              {{ getLabel(item) || '—' }}
            </ion-label>

            <ion-icon
              *ngIf="isSelected(item)"
              name="checkmark-outline"
              slot="end">
            </ion-icon>
          </ion-item>
        </ng-template>

        <ion-item *ngIf="filteredData.length === 0">
          <ion-label color="medium">No hay resultados.</ion-label>
        </ion-item>

      </ion-list>
    </ion-content>
  </ng-template>
</ion-modal>
