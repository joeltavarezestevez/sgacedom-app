<sg-header title="Monitoreos"></sg-header>
<ng-container *ngIf="monitoreos; else loading">
	<ion-content class="ion-padding" color="light">
		<h3 class="ion-padding-top">Monitoreos</h3>
		<!-- Botón para mostrar u ocultar los filtros -->
		<ion-button expand="block" fill="outline" (click)="mostrarFiltros = !mostrarFiltros">
			<ion-icon *ngIf="mostrarFiltros" slot="start" name="funnel-outline"></ion-icon>
			<ion-icon *ngIf="!mostrarFiltros"slot="start" name="funnel"></ion-icon>
			{{ mostrarFiltros ? 'Ocultar filtros' : 'Mostrar filtros' }}
		</ion-button>

		<!-- Filtros -->
		<div *ngIf="mostrarFiltros" class="ion-padding">	
			<h4 class="">Filtros</h4>
			<ion-grid class="ion-no-padding">
				<ion-row>
					<ion-col size="6">
						<ion-item>
							<ion-label position="stacked">Desde</ion-label>
							<ion-input
								type="date"
								[(ngModel)]="filtros.fechaDesde"
								(ionChange)="filtrarMonitoreos()">
							</ion-input>
						</ion-item>
					</ion-col>
					<ion-col size="6">
						<ion-item>
							<ion-label position="stacked">Hasta</ion-label>
							<ion-input
								type="date"
								[(ngModel)]="filtros.fechaHasta"
								(ionChange)="filtrarMonitoreos()">
							</ion-input>
						</ion-item>
					</ion-col>
				</ion-row>
			</ion-grid>			
			<ion-button expand="block" fill="outline" color="medium" (click)="limpiarFiltros()">
				Limpiar Filtros
			</ion-button>
		</div>	
		<ion-list *ngIf="monitoreosFiltrados.length > 0; else sinMonitoreos">
			<ion-item *ngFor="let r of monitoreosFiltrados; let i = index" lines="full" routerLink="/monitoreos/{{r.id}}/details" detail="true">
				<ion-label>
					<h2><strong>Monitoreo No. {{r.id}}</strong></h2>
          <p><ion-icon slot="start" name="calendar-outline"></ion-icon> <strong> Año:</strong> {{ r?.anio }} | <strong>Mes:</strong> {{ mesMap[r.mes] }}</p>
				</ion-label>
			</ion-item>			
		</ion-list>

		<ng-template #sinMonitoreos>
			<ion-text color="medium">
				<p class="ion-text-center">No hay monitoreos registrados.</p>
			</ion-text>
		</ng-template>
	</ion-content>
</ng-container>

<ng-template #loading>
  <ion-card class="ion-padding ion-text-center">
    <ion-spinner name="crescent" color="primary"></ion-spinner>
    <p>Cargando monitoreos...</p>
  </ion-card>
</ng-template>
