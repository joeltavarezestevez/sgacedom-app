<sg-header title="Contacto"></sg-header>

<ion-content class="ion-padding">
	<h3>
    <ion-icon
      name="mail-outline"
      style="vertical-align: middle; margin-right: 6px;">
    </ion-icon>
    Contacto
  </h3>
  <ion-card>
    <ion-card-header>
      <ion-card-title>
        <ion-icon name="location-outline"></ion-icon>
        Ubicación
      </ion-card-title>
    </ion-card-header>
    <ion-card-content>
		<iframe
		  [src]="ubicacionUrl"
		  width="100%"
		  height="250"
		  frameborder="0"
		  style="border:0;"
		  allowfullscreen
		  loading="lazy"
		  referrerpolicy="no-referrer-when-downgrade">
		</iframe>
    </ion-card-content>
  </ion-card>

  <ion-card>
    <ion-card-header>
      <ion-card-title>
        <ion-icon name="information-circle-outline"></ion-icon>
        Información de Contacto
      </ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-list>
        <ion-item lines="none">
          <ion-icon slot="start" name="business-outline"></ion-icon>
          <ion-label>
            SGACEDOM <br>
            Sociedad General de Autores, Compositores y Editores Dominicanos
          </ion-label>
        </ion-item>
        <ion-item lines="none">
          <ion-icon slot="start" name="location-outline"></ion-icon>
          <ion-label>
            Ave. Bolívar No. 14, Gazcue, Santo Domingo
          </ion-label>
        </ion-item>
        <ion-item lines="none">
          <ion-icon slot="start" name="call-outline"></ion-icon>
          <ion-label>
            Atención al Socio: <br>
            <a href="tel:8096896132">809-689-6132 Ext. 233</a>
          </ion-label>
        </ion-item>
      </ion-list>
    </ion-card-content>
  </ion-card>

  <ion-card>
    <ion-card-header>
      <ion-card-title>
        <ion-icon name="help-circle-outline"></ion-icon>
        ¿Necesitas ayuda?
      </ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-button expand="block" fill="outline" color="medium" href="tel:8096896132">
      	<ion-icon slot="start" name="call-outline"></ion-icon>
        Llamar Ahora
      </ion-button>
    	<ion-button expand="block" fill="outline" color="success" (click)="openWhatsapp()">
    	  <ion-icon slot="start" color="success" name="logo-whatsapp"></ion-icon>
    	  Escribir por WhatsApp
    	</ion-button>
    </ion-card-content>
  </ion-card>

</ion-content>
